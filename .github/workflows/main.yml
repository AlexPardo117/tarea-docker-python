name: CI/CD Docker Python //automatizacion de pruebas

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código
      uses: actions/checkout@v4

    - name: 2. Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 3. Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 4. Pruebas Unitarias y Calcular Métrica
      run: |
        python -m pytest test_app.py --cov=.

    - name: 5. Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        version: latest # <--- ESTA LÍNEA SOLUCIONA EL ERROR: Forzamos la última versión

    - name: 6. Validar Dockerfile (Build Checks)
      uses: docker/build-push-action@v6 # Actualizamos a v6 para mejor compatibilidad
      with:
        context: .
        call: check

    - name: 7. Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 8. Construir imagen y subir a Docker Hub
      uses: docker/build-push-action@v6 # Actualizamos a v6 aquí también
      with:
        context: .
        push: true
        tags: alexpardo117/tarea-docker-python:latest