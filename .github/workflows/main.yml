name: CI/CD Docker Python

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código
      uses: actions/checkout@v4 # Actualizado a v4 para evitar el aviso de Node.js

    - name: 2. Configurar Python
      uses: actions/setup-python@v5 # Actualizado a v5
      with:
        python-version: '3.9'

    - name: 3. Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-cov # Instalación directa para asegurar
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 4. Pruebas Unitarias y Calcular Métrica
      run: |
        python -m pytest test_app.py --cov=.

    - name: 5. Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 6. Construir imagen y subir a Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: AlexPardo117/tarea-docker-python:latest