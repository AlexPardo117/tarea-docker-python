name: CI/CD Docker Python

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código
      uses: actions/checkout@v3

    - name: 2. Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 3. Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Pruebas Unitarias y Calcular Métrica
      run: |
        pytest --cov=./ test_app.py

    - name: 5. Iniciar sesión en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 6. Construir imagen y subir a Docker Hub
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: AlexPardo117/tarea-docker-python:latest